services:
  # ─────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_secure_pass_123}
      POSTGRES_DB: ${DB_NAME:-erp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - erp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-erp_db}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────
  # Redis (for Celery tasks & caching)
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp_network
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ─────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_api
    ports:
      - "8000:8000"
    environment:
      #  Database
      - DATABASE_URL=postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-erp_secure_pass_123}@db:5432/${DB_NAME:-erp_db}
      
      #  Redis/Celery
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      
      #  Security
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production-min-32-chars}
      - API_SECRET_KEY=${API_SECRET_KEY:-dev-api-secret-key-change-in-production-min-32-chars}
      - SECRET_KEY=${SECRET_KEY:-dev-general-secret-key-change-in-production-min-32-chars}
      
      # App
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      #  AI Settings 
      - AI_MODEL_PATH=./models/qwen-local          
      - AI_MOCK_MODE=false                          
      - AI_DEVICE=cpu                               
      - FAISS_INDEX_PATH=./models/faiss_index       
      
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./models:/app/models  
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - erp_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  
    restart: unless-stopped

  # ─────────────────────────────────────
  # Celery Beat (for scheduled notifications)
  # ─────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_beat
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-erp_secure_pass_123}@db:5432/${DB_NAME:-erp_db}
      # Notification env vars
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - erp_network
    restart: unless-stopped

networks:
  erp_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
